{% extends "admin/base.html" %}
{% block title %}Change Password — Admin{% endblock %}

{% block content %}
<div style="max-width:480px;">
  <h1 class="page-title">🔐 Change Password</h1>
  <p class="page-sub">Update your admin account password</p>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" name="current_password" class="form-control"
               placeholder="Enter current password" required/>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div style="position:relative;">
          <input type="password" name="new_password" id="np" class="form-control"
                 placeholder="Min 6 characters" minlength="6" required style="padding-right:3rem;"/>
          <button type="button" onclick="togglePass('np','ep')"
                  style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;">
            <span id="ep">👁</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control"
               placeholder="Repeat new password" required/>
      </div>
      <div style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);
                  border-radius:8px;padding:0.85rem 1rem;margin-bottom:1.25rem;
                  font-size:0.85rem;color:#e74c3c;">
        ⚠️ After changing password you will be automatically logged out. Please login with new password.
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button type="submit" class="btn btn-primary">Update Password</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
function togglePass(i,e){const x=document.getElementById(i),y=document.getElementById(e);
x.type=x.type==='password'?'text':'password';y.textContent=x.type==='password'?'👁':'🙈';}
</script>
{% endblock %}
