{% extends "base.html" %}
{% block title %}Register — Smart Quiz{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🎓 SmartQuiz</h1>
      <p>Create your student account</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Roll Number</label>
        <input type="text" name="roll_number" class="form-control" placeholder="e.g. BCA/2024/001" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" minlength="6" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" minlength="6" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('student_login') }}">Login here</a>
    </div>
  </div>
</div>
{% endblock %}
