<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Forgot Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/></head>
<body>
<div class="auth-wrap"><div class="auth-card">
  <div class="auth-logo"><h1>🔑 Forgot Password</h1><p>Enter your email to receive OTP</p></div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat == 'success' else 'error' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Registered Email</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Send OTP →</button>
  </form>
  <div style="background:rgba(52,152,219,0.1);border:1px solid rgba(52,152,219,0.3);border-radius:8px;padding:0.85rem;margin-top:1rem;font-size:0.85rem;color:#3498db;">
    📧 A 6-digit OTP will be sent. Valid for 10 minutes.
  </div>
  <p class="auth-footer mt-2"><a href="{{ url_for('student_login') }}">← Back to Login</a></p>
</div></div>
</body></html>
