<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Smart Quiz System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <h1>🎓 SmartQuiz</h1>
      <p>Performance Analysis System</p>
    </div>
    <p style="text-align:center;color:var(--text-muted);margin-bottom:1.5rem;font-size:0.95rem;">
      Please select your login type
    </p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
      <a href="{{ url_for('student_login') }}"
         style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;
                padding:2rem 1rem;background:rgba(201,168,76,0.08);
                border:2px solid rgba(201,168,76,0.3);border-radius:12px;
                text-decoration:none;transition:all 0.2s;"
         onmouseover="this.style.borderColor='#c9a84c';this.style.transform='translateY(-3px)'"
         onmouseout="this.style.borderColor='rgba(201,168,76,0.3)';this.style.transform=''">
        <span style="font-size:3rem;">👨‍🎓</span>
        <span style="font-weight:700;color:#c9a84c;font-size:1.1rem;">Student</span>
        <span style="color:var(--text-muted);font-size:0.82rem;text-align:center;">Login to take quiz</span>
      </a>
      <a href="{{ url_for('admin_login') }}"
         style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;
                padding:2rem 1rem;background:rgba(52,152,219,0.08);
                border:2px solid rgba(52,152,219,0.3);border-radius:12px;
                text-decoration:none;transition:all 0.2s;"
         onmouseover="this.style.borderColor='#3498db';this.style.transform='translateY(-3px)'"
         onmouseout="this.style.borderColor='rgba(52,152,219,0.3)';this.style.transform=''">
        <span style="font-size:3rem;">👨‍💼</span>
        <span style="font-weight:700;color:#3498db;font-size:1.1rem;">Admin</span>
        <span style="color:var(--text-muted);font-size:0.82rem;text-align:center;">Manage the system</span>
      </a>
    </div>
    <p style="text-align:center;margin-top:1.5rem;font-size:0.88rem;color:var(--text-muted);">
      New student? <a href="{{ url_for('register') }}" style="color:#c9a84c;">Register here</a>
    </p>
  </div>
</div>
</body>
</html>
