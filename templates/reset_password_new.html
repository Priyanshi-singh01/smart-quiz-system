<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Reset Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/></head>
<body>
<div class="auth-wrap"><div class="auth-card">
  <div class="auth-logo"><h1>🔐 Reset Password</h1><p>Set your new password</p></div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat == 'success' else 'error' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <div style="background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3);border-radius:8px;padding:0.7rem 1rem;margin-bottom:1rem;font-size:0.85rem;color:#2ecc71;">
    ✓ Identity verified!
  </div>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div style="position:relative;">
        <input type="password" name="new_password" id="np" class="form-control"
               placeholder="Min 6 characters" minlength="6" required style="padding-right:3rem;"/>
        <button type="button" onclick="togglePass('np','ep1')"
                style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;">
          <span id="ep1">👁</span>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/>
    </div>
    <button type="submit" class="btn btn-primary btn-block btn-lg">Set New Password →</button>
  </form>
</div></div>
<script>
function togglePass(i,e){const x=document.getElementById(i),y=document.getElementById(e);
x.type=x.type==='password'?'text':'password';y.textContent=x.type==='password'?'👁':'🙈';}
</script>
</body></html>
